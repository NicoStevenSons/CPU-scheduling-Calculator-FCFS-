<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCFS CPU Scheduling</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>FCFS Scheduling Calculator</h2>
        
        <table id="inputTable">
            <thead>
                <tr>
                    <th>Process ID</th>
                    <th>Arrival Time</th>
                    <th>Burst Time</th>
                </tr>
            </thead>
            <tbody>
                <tr><td><input type="text" value="P1" class="pid" readonly></td><td><input type="number" class="at" min="0" value="0"></td><td><input type="number" class="bt" min="1" value="1"></td></tr>
            </tbody>
        </table>

        <div id="errorMessage" style="display: none; color: #dc2626; font-weight: 600; margin-bottom: 15px; padding: 10px; background-color: #fee2e2; border-radius: 8px; border: 1px solid #dc2626; cursor: pointer;" onclick="clearError()"></div>

        <div class="button-group">
            <button onclick="addProcess()" class="add-btn">+</button>
            <button onclick="removeProcess()" class="remove-btn">-</button>
        </div>

        <button onclick="calculateFCFS()" class="calc">Calculate</button>

        <h3>Results</h3>
        <table id="resultTable">
            <thead>
                <tr>
                    <th>Process ID</th>
                    <th>Arrival Time</th>
                    <th>Burst Time</th>
                    <th>Completion Time</th>
                    <th>Turnaround Time</th>
                    <th>Waiting Time</th>
                </tr>
            </thead>
            <tbody id="resultBody">
                </tbody>
        </table>

        <div id="averages">
            <p>Average Turnaround Time: <span id="avgTAT">0</span></p>
            <p>Average Waiting Time: <span id="avgWT">0</span></p>
        </div>


        <h3>Gantt Chart</h3>
        <div id="ganttChart" class="gantt-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
